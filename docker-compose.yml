services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: skillranker
      POSTGRES_USER: skillranker
      POSTGRES_PASSWORD: skillranker
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skillranker"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://skillranker:skillranker@db:5432/skillranker
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    volumes:
      - ./data:/app/data
      - ./site/public:/app/site/public
    working_dir: /app

volumes:
  pgdata:
